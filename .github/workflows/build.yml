name: Build

on:
  workflow_dispatch:
    inputs:
      kernel_ver:
        description: Exact WSL kernel version suffix, for example 6.18.26.1
        required: true
        type: string
        default: '6.18.26.1'
      zfs_ver:
        description: OpenZFS release
        required: true
        type: string
        default: '2.4.2'
      publish_release:
        description: Publish a GitHub release with the generated artifacts
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build stock-kernel ZFS module overlay
    runs-on: ubuntu-24.04
    env:
      KERNEL_VER: ${{ inputs.kernel_ver }}
      ZFS_VER: ${{ inputs.zfs_ver }}
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            alien autoconf automake bc bison build-essential ca-certificates curl \
            debhelper-compat dh-autoreconf dh-dkms dh-python dkms dwarves \
            fakeroot flex gawk git kmod libaio-dev libattr1-dev libblkid-dev \
            libcurl4-openssl-dev libelf-dev libffi-dev libpam0g-dev libssl-dev \
            libtirpc-dev libtool libudev-dev libunwind-dev ncompress parallel \
            po-debconf python3 python3-all-dev python3-cffi python3-dev \
            python3-packaging python3-setuptools python3-sphinx uuid-dev \
            xz-utils zip zlib1g-dev

      - name: Build ZFS module overlay
        id: build
        env:
          WORK_DIR: ${{ runner.temp }}/wsl2-zfs-build
        run: bash scripts/build-zfs-overlay.sh

      - name: Upload ZFS module overlay
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_base }}-zfs-module-overlay
          path: |
            artifacts/*.zfs-modules.tar.gz
            artifacts/ARTIFACTS.txt
            artifacts/SHA256SUMS
          if-no-files-found: error
          overwrite: true
          compression-level: 0

      - name: Upload runtime Debian packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_base }}-runtime-debs
          path: |
            artifacts/*.deb
            artifacts/ARTIFACTS.txt
            artifacts/SHA256SUMS
          if-no-files-found: error
          overwrite: true
          compression-level: 0

      - name: Upload kernel build kit
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_base }}-build-kit
          path: |
            artifacts/*.build-kit.tar.gz
            artifacts/ARTIFACTS.txt
            artifacts/SHA256SUMS
          if-no-files-found: error
          overwrite: true
          compression-level: 0

      - name: Package release assets
        if: ${{ inputs.publish_release }}
        env:
          ARTIFACT_BASE: ${{ steps.build.outputs.artifact_base }}
        run: |
          mkdir -p release-assets
          cd artifacts
          zip -0 "../release-assets/${ARTIFACT_BASE}-zfs-module-overlay.zip" *.zfs-modules.tar.gz ARTIFACTS.txt SHA256SUMS
          zip -0 "../release-assets/${ARTIFACT_BASE}-runtime-debs.zip" *.deb ARTIFACTS.txt SHA256SUMS
          zip -0 "../release-assets/${ARTIFACT_BASE}-build-kit.zip" *.build-kit.tar.gz ARTIFACTS.txt SHA256SUMS

      - name: Publish GitHub release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.artifact_base }}
          name: ${{ steps.build.outputs.artifact_base }}
          files: release-assets/*
